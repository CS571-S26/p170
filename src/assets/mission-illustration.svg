<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" role="img">
  <defs>
    <radialGradient id="missionBg" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#fcfbf7"/>
      <stop offset="100%" stop-color="#e8e4d8"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#missionBg)"/>

  <!-- Stylized neuron with axons branching out -->
  <g transform="translate(400,260)">
    <!-- Soma -->
    <circle r="50" fill="#c5050c"/>
    <circle r="30" fill="#9b0000"/>
    <circle cx="-10" cy="-10" r="6" fill="#fcfbf7" opacity="0.7"/>

    <!-- Dendrites (curving outwards) -->
    <g fill="none" stroke="#c5050c" stroke-width="3" stroke-linecap="round">
      <path d="M -45 -25 Q -120 -80, -180 -60 Q -240 -50, -290 -110"/>
      <path d="M -50 0 Q -130 10, -200 -10 Q -270 -20, -320 -50"/>
      <path d="M -45 30 Q -130 60, -200 40 Q -270 30, -310 80"/>
      <path d="M 45 -25 Q 120 -80, 180 -60 Q 240 -50, 290 -110"/>
      <path d="M 50 0 Q 130 10, 200 -10 Q 270 -20, 320 -50"/>
      <path d="M 45 30 Q 130 60, 200 40 Q 270 30, 310 80"/>
      <path d="M -20 50 Q -40 130, -80 180"/>
      <path d="M 20 50 Q 40 130, 80 180"/>
      <path d="M 0 55 Q 0 140, 10 200"/>
    </g>

    <!-- Smaller terminal boutons -->
    <g fill="#9b0000">
      <circle cx="-290" cy="-110" r="5"/>
      <circle cx="-320" cy="-50" r="5"/>
      <circle cx="-310" cy="80" r="5"/>
      <circle cx="290" cy="-110" r="5"/>
      <circle cx="320" cy="-50" r="5"/>
      <circle cx="310" cy="80" r="5"/>
      <circle cx="-80" cy="180" r="5"/>
      <circle cx="80" cy="180" r="5"/>
      <circle cx="10" cy="200" r="5"/>
    </g>
  </g>

  <!-- Subtle floating "value" markers -->
  <g fill="rgba(40,39,40,0.5)" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" letter-spacing="2">
    <text x="40" y="80">CURIOSITY</text>
    <text x="660" y="80">RESEARCH</text>
    <text x="40" y="450">ACCESS</text>
    <text x="640" y="450">IMPACT</text>
  </g>

  <!-- Connecting dotted lines from labels to neuron -->
  <g fill="none" stroke="rgba(40,39,40,0.25)" stroke-width="1" stroke-dasharray="3,4">
    <path d="M 110 90 Q 220 160, 340 230"/>
    <path d="M 690 90 Q 580 160, 460 230"/>
    <path d="M 90 440 Q 220 370, 340 290"/>
    <path d="M 690 440 Q 580 370, 460 290"/>
  </g>
</svg>
