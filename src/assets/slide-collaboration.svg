      <stop offset="100%" stop-color="#c5050c"/>
    </linearGradient>
    <radialGradient id="glowCollab" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
