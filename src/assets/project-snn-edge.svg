<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="bgEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#282728"/>
      <stop offset="100%" stop-color="#1a191a"/>
    </linearGradient>
    <pattern id="circuitGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bgEdge)"/>
  <rect width="800" height="400" fill="url(#circuitGrid)"/>

  <!-- Chip body -->
  <rect x="180" y="120" width="440" height="200" rx="8" fill="#0e0d0e" stroke="#c5050c" stroke-width="3"/>
  <rect x="240" y="160" width="320" height="120" rx="4" fill="none" stroke="#e04e54" stroke-width="2"/>

  <!-- Internal traces -->
  <g fill="none" stroke="rgba(224,78,84,0.6)" stroke-width="1.5">
    <path d="M 260 200 H 340 V 240 H 420"/>
    <path d="M 280 260 H 380 V 220 H 460"/>
    <path d="M 500 180 V 220 H 540"/>
    <path d="M 460 260 V 220"/>
  </g>

  <!-- Internal nodes -->
  <g fill="#c5050c">
    <circle cx="340" cy="200" r="3"/>
    <circle cx="340" cy="240" r="3"/>
    <circle cx="420" cy="240" r="3"/>
    <circle cx="380" cy="260" r="3"/>
    <circle cx="380" cy="220" r="3"/>
    <circle cx="460" cy="220" r="3"/>
    <circle cx="500" cy="220" r="3"/>
    <circle cx="540" cy="220" r="3"/>
  </g>

  <!-- Pins on chip -->
  <g stroke="#e04e54" stroke-width="3">
    <line x1="180" y1="160" x2="140" y2="160"/>
    <line x1="180" y1="200" x2="140" y2="200"/>
    <line x1="180" y1="240" x2="140" y2="240"/>
    <line x1="180" y1="280" x2="140" y2="280"/>
    <line x1="620" y1="160" x2="660" y2="160"/>
    <line x1="620" y1="200" x2="660" y2="200"/>
    <line x1="620" y1="240" x2="660" y2="240"/>
    <line x1="620" y1="280" x2="660" y2="280"/>
  </g>

  <!-- Spike train above the chip -->
  <g fill="none" stroke="#e04e54" stroke-width="2">
    <path d="M 60 70 L 140 70 L 150 50 L 160 75 L 170 70 L 240 70 L 250 50 L 260 75 L 270 70 L 360 70 L 370 50 L 380 75 L 390 70 L 480 70 L 490 50 L 500 75 L 510 70 L 600 70 L 610 50 L 620 75 L 630 70 L 740 70"/>
  </g>

  <!-- Arrow indicating input flow -->
  <g fill="rgba(255,255,255,0.4)" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" letter-spacing="2">
    <text x="60" y="100">SPIKES IN</text>
    <text x="660" y="170">OUTPUT</text>
  </g>

  <!-- Title -->
  <text x="60" y="40" fill="rgba(255,255,255,0.85)" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600" letter-spacing="2">EDGE SNN INFERENCE</text>
</svg>
