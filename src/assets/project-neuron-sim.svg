<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="bgNeuron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfbf7"/>
      <stop offset="100%" stop-color="#f0eee7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgNeuron)"/>

  <!-- Voltage axis -->
  <g stroke="rgba(40,39,40,0.25)" stroke-width="1">
    <line x1="60" y1="40" x2="60" y2="360"/>
    <line x1="60" y1="360" x2="760" y2="360"/>
    <line x1="60" y1="200" x2="760" y2="200" stroke-dasharray="4,4" stroke="rgba(40,39,40,0.15)"/>
  </g>
  <g fill="rgba(40,39,40,0.55)" font-family="-apple-system, Segoe UI, sans-serif" font-size="11">
    <text x="20" y="45">+40</text>
    <text x="22" y="205">-55</text>
    <text x="22" y="365">-90</text>
    <text x="36" y="385">mV</text>
  </g>

  <!-- Action potential trace -->
  <path d="M 60 250 L 160 250 L 180 248 Q 200 200, 220 80 Q 235 70, 245 100 Q 255 220, 270 290 Q 285 330, 310 310 Q 340 280, 360 252 L 460 250 L 480 248 Q 500 200, 520 82 Q 535 70, 545 100 Q 555 220, 570 290 Q 585 330, 610 310 Q 640 280, 660 252 L 760 250"
        fill="none" stroke="#c5050c" stroke-width="3"/>

  <!-- Threshold marker -->
  <circle cx="180" cy="248" r="5" fill="#282728"/>
  <text x="190" y="245" fill="#282728" font-family="-apple-system, Segoe UI, sans-serif" font-size="11">threshold</text>

  <!-- Title -->
  <text x="60" y="30" fill="#282728" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600">Membrane Voltage</text>
</svg>
