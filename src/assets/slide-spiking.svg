<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="bgSpike" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a191a"/>
      <stop offset="100%" stop-color="#282728"/>
    </linearGradient>
    <pattern id="gridSpike" width="80" height="60" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="url(#bgSpike)"/>
  <rect width="1600" height="600" fill="url(#gridSpike)"/>

  <!-- Y-axis labels (channels) -->
  <g fill="rgba(255,255,255,0.5)" font-family="-apple-system, Segoe UI, sans-serif" font-size="12">
    <text x="40" y="120">Ch 1</text>
    <text x="40" y="220">Ch 2</text>
    <text x="40" y="320">Ch 3</text>
    <text x="40" y="420">Ch 4</text>
    <text x="40" y="520">Ch 5</text>
  </g>

  <!-- Voltage traces (action potentials) -->
  <g fill="none" stroke-width="2.5">
    <!-- Trace 1 -->
    <path d="M 100 120 L 220 120 L 240 70 L 260 130 L 280 110 L 420 110 L 440 60 L 460 125 L 480 115 L 640 115 L 660 75 L 680 130 L 700 118 L 900 118 L 920 65 L 940 128 L 960 116 L 1140 116 L 1160 70 L 1180 130 L 1200 118 L 1500 118"
          stroke="#e04e54"/>
    <!-- Trace 2 -->
    <path d="M 100 220 L 180 220 L 200 165 L 220 230 L 240 215 L 380 215 L 400 165 L 420 228 L 440 215 L 580 215 L 600 168 L 620 230 L 640 218 L 820 218 L 840 162 L 860 230 L 880 218 L 1080 218 L 1100 165 L 1120 230 L 1140 218 L 1500 218"
          stroke="#c5050c"/>
    <!-- Trace 3 -->
    <path d="M 100 320 L 280 320 L 300 268 L 320 330 L 340 318 L 540 318 L 560 270 L 580 330 L 600 318 L 800 318 L 820 268 L 840 330 L 860 318 L 1060 318 L 1080 270 L 1100 330 L 1120 318 L 1320 318 L 1340 270 L 1360 330 L 1380 318 L 1500 318"
          stroke="#e04e54"/>
    <!-- Trace 4 -->
    <path d="M 100 420 L 200 420 L 220 368 L 240 432 L 260 418 L 480 418 L 500 370 L 520 432 L 540 418 L 720 418 L 740 368 L 760 432 L 780 418 L 1000 418 L 1020 370 L 1040 432 L 1060 418 L 1260 418 L 1280 370 L 1300 432 L 1320 418 L 1500 418"
          stroke="#c5050c"/>
    <!-- Trace 5 -->
    <path d="M 100 520 L 240 520 L 260 470 L 280 530 L 300 518 L 460 518 L 480 470 L 500 532 L 520 518 L 700 518 L 720 470 L 740 532 L 760 518 L 940 518 L 960 470 L 980 530 L 1000 518 L 1180 518 L 1200 470 L 1220 532 L 1240 518 L 1500 518"
          stroke="#e04e54"/>
  </g>

  <!-- "Time" axis -->
  <line x1="100" y1="560" x2="1500" y2="560" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="780" y="585" fill="rgba(255,255,255,0.5)" font-family="-apple-system, Segoe UI, sans-serif" font-size="12" text-anchor="middle">time</text>

</svg>
