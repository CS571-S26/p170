<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="bgMem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfbf7"/>
      <stop offset="100%" stop-color="#e8e4d8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgMem)"/>

  <!-- Crossbar grid: horizontal "wordlines" and vertical "bitlines" -->
  <g stroke="#646569" stroke-width="2">
    <line x1="120" y1="100" x2="680" y2="100"/>
    <line x1="120" y1="160" x2="680" y2="160"/>
    <line x1="120" y1="220" x2="680" y2="220"/>
    <line x1="120" y1="280" x2="680" y2="280"/>
    <line x1="120" y1="340" x2="680" y2="340"/>
  </g>
  <g stroke="#282728" stroke-width="2">
    <line x1="180" y1="60" x2="180" y2="380"/>
    <line x1="260" y1="60" x2="260" y2="380"/>
    <line x1="340" y1="60" x2="340" y2="380"/>
    <line x1="420" y1="60" x2="420" y2="380"/>
    <line x1="500" y1="60" x2="500" y2="380"/>
    <line x1="580" y1="60" x2="580" y2="380"/>
    <line x1="640" y1="60" x2="640" y2="380"/>
  </g>

  <!-- Memristor "devices" at intersections (varying conductance) -->
  <g>
    <!-- Row 1 -->
    <circle cx="180" cy="100" r="9" fill="#c5050c" opacity="0.85"/>
    <circle cx="260" cy="100" r="9" fill="#c5050c" opacity="0.35"/>
    <circle cx="340" cy="100" r="9" fill="#c5050c" opacity="0.7"/>
    <circle cx="420" cy="100" r="9" fill="#c5050c" opacity="0.5"/>
    <circle cx="500" cy="100" r="9" fill="#c5050c" opacity="0.95"/>
    <circle cx="580" cy="100" r="9" fill="#c5050c" opacity="0.4"/>
    <circle cx="640" cy="100" r="9" fill="#c5050c" opacity="0.6"/>
    <!-- Row 2 -->
    <circle cx="180" cy="160" r="9" fill="#c5050c" opacity="0.55"/>
    <circle cx="260" cy="160" r="9" fill="#c5050c" opacity="0.9"/>
    <circle cx="340" cy="160" r="9" fill="#c5050c" opacity="0.3"/>
    <circle cx="420" cy="160" r="9" fill="#c5050c" opacity="0.75"/>
    <circle cx="500" cy="160" r="9" fill="#c5050c" opacity="0.5"/>
    <circle cx="580" cy="160" r="9" fill="#c5050c" opacity="0.85"/>
    <circle cx="640" cy="160" r="9" fill="#c5050c" opacity="0.45"/>
    <!-- Row 3 -->
    <circle cx="180" cy="220" r="9" fill="#c5050c" opacity="0.7"/>
    <circle cx="260" cy="220" r="9" fill="#c5050c" opacity="0.4"/>
    <circle cx="340" cy="220" r="9" fill="#c5050c" opacity="0.95"/>
    <circle cx="420" cy="220" r="9" fill="#c5050c" opacity="0.55"/>
    <circle cx="500" cy="220" r="9" fill="#c5050c" opacity="0.35"/>
    <circle cx="580" cy="220" r="9" fill="#c5050c" opacity="0.65"/>
    <circle cx="640" cy="220" r="9" fill="#c5050c" opacity="0.85"/>
    <!-- Row 4 -->
    <circle cx="180" cy="280" r="9" fill="#c5050c" opacity="0.45"/>
    <circle cx="260" cy="280" r="9" fill="#c5050c" opacity="0.7"/>
    <circle cx="340" cy="280" r="9" fill="#c5050c" opacity="0.55"/>
    <circle cx="420" cy="280" r="9" fill="#c5050c" opacity="0.85"/>
    <circle cx="500" cy="280" r="9" fill="#c5050c" opacity="0.4"/>
    <circle cx="580" cy="280" r="9" fill="#c5050c" opacity="0.6"/>
    <circle cx="640" cy="280" r="9" fill="#c5050c" opacity="0.9"/>
    <!-- Row 5 -->
    <circle cx="180" cy="340" r="9" fill="#c5050c" opacity="0.6"/>
    <circle cx="260" cy="340" r="9" fill="#c5050c" opacity="0.95"/>
    <circle cx="340" cy="340" r="9" fill="#c5050c" opacity="0.4"/>
    <circle cx="420" cy="340" r="9" fill="#c5050c" opacity="0.7"/>
    <circle cx="500" cy="340" r="9" fill="#c5050c" opacity="0.5"/>
    <circle cx="580" cy="340" r="9" fill="#c5050c" opacity="0.8"/>
    <circle cx="640" cy="340" r="9" fill="#c5050c" opacity="0.35"/>
  </g>

  <!-- Title -->
  <text x="120" y="40" fill="#282728" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600" letter-spacing="2">MEMRISTIVE CROSSBAR ARRAY</text>
</svg>
